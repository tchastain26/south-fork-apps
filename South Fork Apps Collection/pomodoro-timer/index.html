<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #1a1f1b;
      --surface-2: #202722;
      --border: #2a2f2b;
      --accent: #7ddb84;
      --text: #e8e8e8;
      --muted: #aab5ac;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1f1b;
      border-bottom: 1px solid #2a2f2b;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-back {
      color: #7ddb84;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .nav-back:hover { text-decoration: underline; }
    .nav-title {
      color: #e8e8e8;
      font-size: 0.875rem;
      font-weight: 600;
    }
    main {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 8vw, 4.5rem);
      line-height: 1;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .stage {
      display: grid;
      place-items: center;
      min-height: 22rem;
      margin-top: 1.25rem;
      border: 1px solid rgba(125, 219, 132, 0.35);
      border-radius: 8px;
      background: #111412;
      text-align: center;
    }
    .phase {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .time {
      margin: 0.5rem 0;
      font-size: clamp(4rem, 20vw, 8rem);
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .meta {
      color: var(--muted);
      font-weight: 700;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }
    button {
      min-height: 2.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #102113;
    }
    button:hover { filter: brightness(1.08); }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .stat {
      padding: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111412;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .stat strong {
      display: block;
      margin-top: 0.25rem;
      font-size: 1.35rem;
    }
    footer {
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
    @media (max-width: 620px) {
      .controls, .stats { grid-template-columns: 1fr; }
      .nav { padding-inline: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a>
    <span class="nav-title">Pomodoro Timer</span>
  </nav>
  <main>
    <section class="panel">
      <h1>Run the cycle.</h1>
      <p>Focus for 25 minutes, take a 5-minute break, then get a 15-minute long break after every fourth focus session.</p>
      <div class="stage" aria-live="polite">
        <div>
          <div id="phase" class="phase">Focus</div>
          <div id="time" class="time">25:00</div>
          <div id="meta" class="meta">Ready to start.</div>
        </div>
      </div>
      <div class="controls">
        <button id="start" class="primary" type="button">Start</button>
        <button id="skip" type="button">Skip Phase</button>
        <button id="reset" type="button">Reset</button>
      </div>
      <div class="stats">
        <div class="stat"><span>Completed focus sessions</span><strong id="sessions">0</strong></div>
        <div class="stat"><span>Next long break after</span><strong id="untilLong">4</strong></div>
        <div class="stat"><span>Current length</span><strong id="length">25 min</strong></div>
      </div>
    </section>
    <footer>v1.0</footer>
  </main>
  <script>
    const DURATIONS = { focus: 25 * 60, short: 5 * 60, long: 15 * 60 };
    const state = { phase: 'focus', remaining: DURATIONS.focus, running: false, sessions: 0, timer: null };
    const phaseEl = document.getElementById('phase');
    const timeEl = document.getElementById('time');
    const metaEl = document.getElementById('meta');
    const startBtn = document.getElementById('start');

    function format(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function phaseName() {
      if (state.phase === 'focus') return 'Focus';
      if (state.phase === 'short') return 'Short Break';
      return 'Long Break';
    }

    function render() {
      phaseEl.textContent = phaseName();
      timeEl.textContent = format(state.remaining);
      startBtn.textContent = state.running ? 'Pause' : 'Start';
      metaEl.textContent = state.running ? 'Timer running.' : 'Paused.';
      document.getElementById('sessions').textContent = state.sessions;
      document.getElementById('untilLong').textContent = Math.max(0, 4 - (state.sessions % 4 || 0));
      document.getElementById('length').textContent = `${Math.round(DURATIONS[state.phase] / 60)} min`;
    }

    function beep() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.38);
    }

    function nextPhase() {
      beep();
      if (state.phase === 'focus') {
        state.sessions += 1;
        state.phase = state.sessions % 4 === 0 ? 'long' : 'short';
      } else {
        state.phase = 'focus';
      }
      state.remaining = DURATIONS[state.phase];
      render();
    }

    function tick() {
      if (!state.running) return;
      state.remaining -= 1;
      if (state.remaining <= 0) nextPhase();
      render();
    }

    function setRunning(running) {
      state.running = running;
      clearInterval(state.timer);
      state.timer = running ? setInterval(tick, 1000) : null;
      render();
    }

    startBtn.addEventListener('click', () => setRunning(!state.running));
    document.getElementById('skip').addEventListener('click', nextPhase);
    document.getElementById('reset').addEventListener('click', () => {
      setRunning(false);
      state.phase = 'focus';
      state.remaining = DURATIONS.focus;
      state.sessions = 0;
      metaEl.textContent = 'Ready to start.';
      render();
    });
    render();
  </script>
</body>
</html>
