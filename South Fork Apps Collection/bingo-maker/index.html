<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Maker | South Fork Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #1a1f1b;
      --surface-2: #202722;
      --border: #2a2f2b;
      --accent: #7ddb84;
      --text: #e8e8e8;
      --muted: #aab5ac;
      --danger: #ff9f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #111412;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1f1b;
      border-bottom: 1px solid #2a2f2b;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-back {
      color: #7ddb84;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .nav-back:hover { text-decoration: underline; }
    .nav-title {
      color: #e8e8e8;
      font-size: 0.875rem;
      font-weight: 600;
    }
    main {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0;
      display: grid;
      gap: 1rem;
      grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: 1;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      min-height: 14rem;
      margin-top: 1rem;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111412;
      color: var(--text);
      font: inherit;
      line-height: 1.45;
      padding: 1rem;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(125, 219, 132, 0.12);
    }
    .controls {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    label {
      display: grid;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #111412;
      color: var(--text);
      font: inherit;
      padding: 0.9rem 1rem;
      outline: none;
    }
    button {
      min-height: 2.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #102113;
    }
    .status {
      min-height: 1.4rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }
    .workspace {
      display: grid;
      gap: 1rem;
    }
    .caller {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 8px;
      background: #111412;
      border: 1px solid rgba(125, 219, 132, 0.22);
    }
    .caller strong {
      color: var(--accent);
      font-size: clamp(1.2rem, 4vw, 2rem);
    }
    .cards {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .card {
      background: #111412;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.35rem;
    }
    .cell {
      min-height: 4.8rem;
      padding: 0.35rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #171c18;
      font-size: 0.77rem;
      line-height: 1.25;
      display: grid;
      place-items: center;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .free {
      background: rgba(125, 219, 132, 0.15);
      color: var(--accent);
      font-weight: 800;
    }
    footer {
      margin-top: 0.75rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .nav { padding-inline: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a>
    <span class="nav-title">Bingo Maker</span>
  </nav>
  <main>
    <section class="panel">
      <h1>Build bingo cards.</h1>
      <p>Paste prompts, generate randomized cards, then call items one by one.</p>
      <textarea id="entries">Inbox Zero
Deep Work
Reply All
Second Coffee
Tab Overload
One More Revision
Calendar Shuffle
Muted Mic
Ship It
Parking Lot
Screen Share
Quick Win
Scope Creep
Standing Desk
Template Fix
Weekly Review
Version One
AirDrop
Follow Up
Voice Memo
Final Final
Track Changes
Water Break
Snooze Alarm
Another Meeting
Low Battery</textarea>
      <div class="controls">
        <div class="row">
          <label>
            Card title
            <input id="title" type="text" value="South Fork Bingo">
          </label>
          <label>
            Cards to generate
            <select id="count">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
            </select>
          </label>
        </div>
        <button id="generate" class="primary" type="button">Generate Cards</button>
        <div id="status" class="status">Load at least 24 entries to start.</div>
      </div>
      <footer>v1.0</footer>
    </section>

    <section class="panel workspace">
      <div class="caller">
        <div>
          <span style="color:#aab5ac;font-size:0.82rem;font-weight:700;text-transform:uppercase;">Caller</span>
          <strong id="currentCall">Nothing called yet</strong>
        </div>
        <button id="callNext" type="button">Call Next</button>
      </div>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <script>
    const cardsEl = document.getElementById('cards');
    let callerPool = [];

    function parseEntries() {
      return document.getElementById('entries').value
        .split('\n')
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildCard(entries, title, index) {
      const card = document.createElement('article');
      card.className = 'card';
      const heading = document.createElement('div');
      heading.className = 'card-title';
      heading.innerHTML = `<span>${title}</span><span>Card ${index + 1}</span>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      const picks = shuffle(entries).slice(0, 24);
      for (let i = 0; i < 25; i += 1) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (i === 12) {
          cell.classList.add('free');
          cell.textContent = 'FREE';
        } else {
          cell.textContent = picks.shift();
        }
        grid.appendChild(cell);
      }
      card.append(heading, grid);
      return card;
    }

    function generate() {
      const entries = parseEntries();
      const statusEl = document.getElementById('status');
      if (entries.length < 24) {
        statusEl.textContent = 'You need at least 24 entries to generate a 5x5 board with a free center.';
        return;
      }
      const title = document.getElementById('title').value.trim() || 'Bingo';
      const count = Number(document.getElementById('count').value);
      cardsEl.textContent = '';
      for (let i = 0; i < count; i += 1) cardsEl.appendChild(buildCard(entries, title, i));
      callerPool = shuffle(entries);
      document.getElementById('currentCall').textContent = 'Ready to call';
      statusEl.textContent = `${count} card${count === 1 ? '' : 's'} generated.`;
    }

    document.getElementById('generate').addEventListener('click', generate);
    document.getElementById('callNext').addEventListener('click', () => {
      if (!callerPool.length) callerPool = shuffle(parseEntries());
      document.getElementById('currentCall').textContent = callerPool.shift() || 'No entries loaded';
    });

    generate();
  </script>
</body>
</html>
