<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Pop | South Fork Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #1a1f1b;
      --surface-2: #202722;
      --border: #2a2f2b;
      --accent: #7ddb84;
      --text: #e8e8e8;
      --muted: #aab5ac;
      --tile: #223228;
      --tile-pop: #121713;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #172019 0%, #111412 55%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1f1b;
      border-bottom: 1px solid #2a2f2b;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-back {
      color: #7ddb84;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .nav-back:hover { text-decoration: underline; }
    .nav-title {
      color: #e8e8e8;
      font-size: 0.875rem;
      font-weight: 600;
    }
    main {
      width: min(1080px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0;
      display: grid;
      gap: 1rem;
      grid-template-columns: minmax(0, 1fr) 300px;
    }
    .panel {
      background: rgba(26, 31, 27, 0.92);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: 1;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .toolbar {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.5rem;
    }
    button {
      min-height: 2.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.active,
    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #102113;
    }
    .board-shell {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(125, 219, 132, 0.15), rgba(125, 219, 132, 0.04));
      border: 1px solid rgba(125, 219, 132, 0.2);
      overflow: auto;
    }
    .board {
      display: grid;
      gap: 0.9rem;
      justify-content: center;
    }
    .bubble {
      width: clamp(3rem, 7vw, 4.4rem);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.25);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22), rgba(255,255,255,0) 22%),
        linear-gradient(145deg, #33503d, var(--tile));
      box-shadow: inset 0 0.55rem 0.75rem rgba(255,255,255,0.05), inset 0 -0.5rem 0.75rem rgba(0,0,0,0.25);
      transition: transform 0.08s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .bubble.popped {
      background:
        radial-gradient(circle at 55% 60%, rgba(255,255,255,0.04), rgba(255,255,255,0) 28%),
        linear-gradient(145deg, #131715, var(--tile-pop));
      box-shadow: inset 0 0.3rem 0.45rem rgba(0,0,0,0.35);
      transform: translateY(1px);
    }
    .stats {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .stat {
      padding: 0.95rem;
      background: #111412;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .stat strong {
      display: block;
      margin-top: 0.2rem;
      font-size: 1.5rem;
      color: var(--accent);
    }
    footer {
      margin-top: 0.75rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      .nav { padding-inline: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a>
    <span class="nav-title">Virtual Pop</span>
  </nav>
  <main>
    <section class="panel">
      <h1>Pop the board.</h1>
      <p>Simple browser fidget toy. Click, tap, reset, repeat.</p>
      <div class="toolbar">
        <div class="segmented" id="sizes">
          <button type="button" data-size="6" class="active">6×6</button>
          <button type="button" data-size="8">8×8</button>
          <button type="button" data-size="10">10×10</button>
        </div>
        <button id="reset" class="primary" type="button">Reset Board</button>
      </div>
      <div class="board-shell">
        <div id="board" class="board" aria-label="Virtual pop board"></div>
      </div>
    </section>

    <aside class="panel">
      <div class="stats">
        <div class="stat">
          <span>Popped</span>
          <strong id="poppedCount">0</strong>
        </div>
        <div class="stat">
          <span>Remaining</span>
          <strong id="remainingCount">36</strong>
        </div>
        <div class="stat">
          <span>Board size</span>
          <strong id="sizeLabel">6 × 6</strong>
        </div>
      </div>
      <footer>v1.0</footer>
    </aside>
  </main>

  <script>
    const board = document.getElementById('board');
    let size = 6;

    function updateStats() {
      const bubbles = Array.from(board.children);
      const popped = bubbles.filter((bubble) => bubble.classList.contains('popped')).length;
      document.getElementById('poppedCount').textContent = popped;
      document.getElementById('remainingCount').textContent = bubbles.length - popped;
      document.getElementById('sizeLabel').textContent = `${size} × ${size}`;
    }

    function buildBoard(nextSize) {
      size = nextSize;
      board.textContent = '';
      board.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;
      for (let i = 0; i < size * size; i += 1) {
        const bubble = document.createElement('button');
        bubble.type = 'button';
        bubble.className = 'bubble';
        bubble.setAttribute('aria-label', `Bubble ${i + 1}`);
        bubble.addEventListener('click', () => {
          bubble.classList.toggle('popped');
          updateStats();
        });
        board.appendChild(bubble);
      }
      updateStats();
    }

    document.getElementById('reset').addEventListener('click', () => buildBoard(size));
    document.querySelectorAll('[data-size]').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('[data-size]').forEach((item) => item.classList.toggle('active', item === button));
        buildBoard(Number(button.dataset.size));
      });
    });

    buildBoard(size);
  </script>
</body>
</html>
