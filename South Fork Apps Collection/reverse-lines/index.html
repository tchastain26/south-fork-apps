<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse Lines | South Fork Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#111412; --surface:#1a1f1b; --surface-2:#202722; --border:#2a2f2b; --accent:#7ddb84; --text:#e8e8e8; --muted:#aab5ac; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; }
    .nav { display:flex; align-items:center; gap:1rem; padding:0.75rem 1.5rem; background:#1a1f1b; border-bottom:1px solid #2a2f2b; font-family:'Plus Jakarta Sans',sans-serif; }
    .nav-back { color:#7ddb84; text-decoration:none; font-size:0.875rem; font-weight:500; } .nav-back:hover { text-decoration:underline; } .nav-title { color:#e8e8e8; font-size:0.875rem; font-weight:600; }
    main { width:min(1100px, calc(100% - 2rem)); margin:0 auto; padding:2rem 0; } .panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.25rem; }
    h1 { margin:0 0 0.5rem; font-size:clamp(2rem, 7vw, 4rem); line-height:1; } p { margin:0; color:var(--muted); line-height:1.6; }
    .layout { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem; } textarea { width:100%; min-height:22rem; border:1px solid var(--border); border-radius:8px; background:#111412; color:var(--text); font:inherit; padding:1rem; resize:vertical; }
    textarea[readonly] { color:#d6dfd7; } .actions { display:flex; gap:0.75rem; margin-top:0.75rem; flex-wrap:wrap; } button { min-height:2.8rem; border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text); font:inherit; font-weight:800; padding:0 1rem; cursor:pointer; }
    .primary { border-color:var(--accent); background:var(--accent); color:#102113; } .meta { margin-top:0.75rem; color:var(--muted); font-size:0.9rem; font-weight:700; } footer { margin-top:1rem; text-align:center; color:var(--muted); font-size:0.8rem; }
    @media (max-width: 860px) { .layout { grid-template-columns:1fr; } .nav { padding-inline:1rem; } }
  </style>
</head>
<body>
  <nav class="nav"><a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a><span class="nav-title">Reverse Lines</span></nav>
  <main><section class="panel"><h1>Flip line order.</h1><p>Reverse the order of lines without touching the content on each line.</p>
    <div class="layout">
      <div><textarea id="input" placeholder="Line 1&#10;Line 2&#10;Line 3"></textarea></div>
      <div><textarea id="output" readonly placeholder="Reversed lines appear here"></textarea></div>
    </div>
    <div class="actions"><button id="copy" class="primary" type="button">Copy Result</button><button id="clear" type="button">Clear</button></div>
    <div id="meta" class="meta">Ready.</div><footer>v1.0</footer></section></main>
  <script>
    const input = document.getElementById('input'); const output = document.getElementById('output'); const meta = document.getElementById('meta');
    function update() { const lines = input.value.split('\n'); output.value = lines.reverse().join('\n'); meta.textContent = `${lines.filter(Boolean).length} lines processed.`; }
    input.addEventListener('input', update); document.getElementById('clear').addEventListener('click', () => { input.value=''; update(); input.focus(); });
    document.getElementById('copy').addEventListener('click', async () => { await navigator.clipboard.writeText(output.value); meta.textContent='Copied result.'; });
    update();
  </script>
</body>
</html>
