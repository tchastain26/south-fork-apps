<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CSV Column Extractor | South Fork Apps</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#111412;--surface:#1a1f1b;--surface-2:#202722;--border:#2a2f2b;--accent:#7ddb84;--text:#e8e8e8;--muted:#aab5ac}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}.nav{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;background:#1a1f1b;border-bottom:1px solid #2a2f2b;font-family:'Plus Jakarta Sans',sans-serif}.nav-back{color:#7ddb84;text-decoration:none;font-size:.875rem;font-weight:500}.nav-back:hover{text-decoration:underline}.nav-title{color:#e8e8e8;font-size:.875rem;font-weight:600}main{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:2rem 0}.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem}h1{margin:0 0 .5rem;font-size:clamp(2rem,7vw,4rem);line-height:1}p{margin:0;color:var(--muted);line-height:1.6}.controls{display:grid;grid-template-columns:minmax(0,1fr) minmax(220px,280px);gap:.75rem;margin-top:1rem;align-items:start}.controls textarea{margin-top:0}textarea,input{width:100%;border:1px solid var(--border);border-radius:8px;background:#111412;color:var(--text);font:inherit;padding:1rem}textarea{min-height:16rem;resize:vertical;margin-top:1rem}.actions{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}button{min-height:2.8rem;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font:inherit;font-weight:800;padding:0 1rem;cursor:pointer}.primary{border-color:var(--accent);background:var(--accent);color:#102113}.meta{margin-top:.75rem;color:var(--muted);font-size:.9rem;font-weight:700}footer{margin-top:1rem;text-align:center;color:var(--muted);font-size:.8rem}@media(max-width:860px){.controls{grid-template-columns:1fr}.nav{padding-inline:1rem}}</style></head><body><nav class="nav"><a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a><span class="nav-title">CSV Column Extractor</span></nav><main><section class="panel"><h1>Pull one column.</h1><p>Extract a single column from simple comma-separated text.</p><div class="controls"><textarea id="input" placeholder="Name,Role,Team&#10;Tucker,Creative Media,Ballad"></textarea><input id="column" type="number" min="0" value="0" aria-label="Column index"></div><textarea id="output" readonly placeholder="Extracted values"></textarea><div class="actions"><button id="copy" class="primary" type="button">Copy Result</button><button id="clear" type="button">Clear</button></div><div id="meta" class="meta">Ready.</div><footer>v1.0</footer></section></main><script>const i=document.getElementById('input'),c=document.getElementById('column'),o=document.getElementById('output'),m=document.getElementById('meta');function u(){const col=Math.max(Number(c.value)||0,0);const rows=i.value.split('\n').filter(Boolean).map(line=>line.split(','));o.value=rows.map(row=>(row[col]||'').trim()).join('\n');m.textContent=`${rows.length} rows scanned.`}async function n(v){if(!v){m.textContent='Nothing to copy yet.';return}try{await navigator.clipboard.writeText(v);m.textContent='Copied result.'}catch{m.textContent='Clipboard blocked. Select and copy manually.'}}i.addEventListener('input',u);c.addEventListener('input',u);document.getElementById('copy').addEventListener('click',()=>n(o.value));document.getElementById('clear').addEventListener('click',()=>{i.value='';c.value=0;u()});u();</script></body></html>
