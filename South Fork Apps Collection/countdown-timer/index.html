<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #1a1f1b;
      --surface-2: #202722;
      --border: #2a2f2b;
      --accent: #7ddb84;
      --text: #e8e8e8;
      --muted: #aab5ac;
      --danger: #ff9f9f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1f1b;
      border-bottom: 1px solid #2a2f2b;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-back {
      color: #7ddb84;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .nav-back:hover { text-decoration: underline; }
    .nav-title {
      color: #e8e8e8;
      font-size: 0.875rem;
      font-weight: 600;
    }
    main { width: min(980px, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
    h1 { margin: 0 0 0.5rem; font-size: clamp(2rem, 5vw, 3.8rem); line-height: 1; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.75rem; margin-top: 1.25rem; align-items: end; }
    label { display: grid; gap: 0.45rem; color: var(--muted); font-size: 0.85rem; font-weight: 700; }
    input { width: 100%; border: 1px solid var(--border); border-radius: 8px; background: #111412; color: var(--text); font: inherit; padding: 0.9rem; color-scheme: dark; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(125, 219, 132, 0.14); }
    button { min-height: 2.8rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); color: var(--text); font: inherit; font-weight: 800; cursor: pointer; padding: 0 0.9rem; }
    button.primary { border-color: var(--accent); background: var(--accent); color: #102113; }
    .list { display: grid; gap: 0.75rem; margin-top: 1rem; }
    .event { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: #111412; }
    .event strong { display: block; overflow-wrap: anywhere; }
    .time { margin-top: 0.45rem; color: var(--accent); font-size: clamp(1.4rem, 5vw, 2.4rem); font-weight: 800; font-variant-numeric: tabular-nums; }
    .stamp { margin-top: 0.3rem; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
    .message { min-height: 1.4rem; margin-top: 0.75rem; color: var(--muted); font-weight: 700; }
    .message.error { color: var(--danger); }
    footer { margin-top: 1.5rem; color: var(--muted); font-size: 0.8rem; text-align: center; }
    @media (max-width: 760px) {
      .form, .event { grid-template-columns: 1fr; }
      .nav { padding-inline: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a>
    <span class="nav-title">Countdown Timer</span>
  </nav>
  <main>
    <section class="panel">
      <h1>Count it down.</h1>
      <p>Save up to five live event countdowns in this browser.</p>
      <div class="form">
        <label>Event name <input id="name" maxlength="60" placeholder="Launch day"></label>
        <label>Target date and time <input id="target" type="datetime-local"></label>
        <button id="add" class="primary" type="button">Add</button>
      </div>
      <div id="message" class="message"></div>
      <div id="list" class="list" aria-live="polite"></div>
    </section>
    <footer>v1.0</footer>
  </main>
  <script>
    const key = 'southForkCountdowns';
    let events = JSON.parse(localStorage.getItem(key) || '[]');

    function save() {
      localStorage.setItem(key, JSON.stringify(events));
    }

    function format(ms) {
      if (ms <= 0) return "It's time!";
      let seconds = Math.floor(ms / 1000);
      const days = Math.floor(seconds / 86400);
      seconds -= days * 86400;
      const hours = Math.floor(seconds / 3600);
      seconds -= hours * 3600;
      const minutes = Math.floor(seconds / 60);
      seconds -= minutes * 60;
      return `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    function render() {
      const list = document.getElementById('list');
      const message = document.getElementById('message');
      list.textContent = '';
      message.classList.remove('error');
      message.textContent = `${events.length}/5 countdowns saved.`;
      if (!events.length) {
        const empty = document.createElement('p');
        empty.textContent = 'No countdowns yet.';
        list.appendChild(empty);
        return;
      }
      events.sort((a, b) => new Date(a.target) - new Date(b.target));
      events.forEach((event, index) => {
        const row = document.createElement('div');
        row.className = 'event';
        const details = document.createElement('div');
        const name = document.createElement('strong');
        name.textContent = event.name;
        const time = document.createElement('div');
        time.className = 'time';
        time.textContent = format(new Date(event.target) - new Date());
        const stamp = document.createElement('div');
        stamp.className = 'stamp';
        stamp.textContent = new Date(event.target).toLocaleString();
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.textContent = 'Remove';
        remove.addEventListener('click', () => {
          events.splice(index, 1);
          save();
          render();
        });
        details.append(name, time, stamp);
        row.append(details, remove);
        list.appendChild(row);
      });
    }

    document.getElementById('add').addEventListener('click', () => {
      const name = document.getElementById('name');
      const target = document.getElementById('target');
      const message = document.getElementById('message');
      if (!name.value.trim() || !target.value) return;
      if (events.length >= 5) {
        message.textContent = 'Limit reached: 5 countdowns.';
        message.classList.add('error');
        return;
      }
      events.push({ name: name.value.trim(), target: target.value });
      name.value = '';
      target.value = '';
      save();
      render();
    });
    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
