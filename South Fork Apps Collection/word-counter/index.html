<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #1a1f1b;
      --surface-2: #202722;
      --border: #2a2f2b;
      --accent: #7ddb84;
      --text: #e8e8e8;
      --muted: #aab5ac;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1f1b;
      border-bottom: 1px solid #2a2f2b;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-back {
      color: #7ddb84;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .nav-back:hover { text-decoration: underline; }
    .nav-title {
      color: #e8e8e8;
      font-size: 0.875rem;
      font-weight: 600;
    }
    main {
      width: min(1080px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: end;
      margin-bottom: 1rem;
    }
    h1 {
      margin: 0 0 0.4rem;
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 1;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    button {
      min-height: 2.75rem;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-weight: 700;
      padding: 0 1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover {
      background: var(--accent);
      color: #102113;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 1rem;
      align-items: start;
    }
    textarea {
      width: 100%;
      min-height: 520px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      line-height: 1.6;
      padding: 1rem;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(125, 219, 132, 0.14);
    }
    .stats {
      display: grid;
      gap: 0.75rem;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .stat strong {
      color: var(--text);
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .stat.primary {
      background: var(--surface-2);
      border-color: rgba(125, 219, 132, 0.45);
    }
    .stat.primary strong { color: var(--accent); }
    footer {
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
    @media (max-width: 820px) {
      .top, .workspace { display: block; }
      button { margin-top: 1rem; width: 100%; }
      textarea { min-height: 340px; margin-bottom: 1rem; }
      .nav { padding-inline: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a>
    <span class="nav-title">Word Counter</span>
  </nav>
  <main>
    <section class="top">
      <div>
        <h1>Live text stats.</h1>
        <p>Paste draft text and get word count, character count, reading time, speaking time, and structure stats as you type.</p>
      </div>
      <button id="clear" type="button">Clear</button>
    </section>

    <section class="workspace">
      <textarea id="text" placeholder="Paste or type your text here..."></textarea>
      <aside class="stats" aria-label="Text statistics">
        <div class="stat primary"><span>Words</span><strong id="words">0</strong></div>
        <div class="stat"><span>Characters</span><strong id="chars">0</strong></div>
        <div class="stat"><span>No spaces</span><strong id="charsNoSpaces">0</strong></div>
        <div class="stat"><span>Sentences</span><strong id="sentences">0</strong></div>
        <div class="stat"><span>Paragraphs</span><strong id="paragraphs">0</strong></div>
        <div class="stat"><span>Reading time</span><strong id="readingTime">0 min</strong></div>
        <div class="stat"><span>Speaking time</span><strong id="speakingTime">0 min</strong></div>
      </aside>
    </section>
    <footer>v1.0</footer>
  </main>

  <script>
    const text = document.getElementById('text');
    const output = {
      words: document.getElementById('words'),
      chars: document.getElementById('chars'),
      charsNoSpaces: document.getElementById('charsNoSpaces'),
      sentences: document.getElementById('sentences'),
      paragraphs: document.getElementById('paragraphs'),
      readingTime: document.getElementById('readingTime'),
      speakingTime: document.getElementById('speakingTime')
    };

    function pluralMinutes(minutes) {
      return `${minutes} min`;
    }

    function countText() {
      const value = text.value;
      const trimmed = value.trim();
      const words = trimmed ? trimmed.match(/\b[\w'-]+\b/g) || [] : [];
      const sentences = trimmed ? trimmed.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [] : [];
      const paragraphs = trimmed ? trimmed.split(/\n\s*\n/).filter(Boolean) : [];
      const readingMinutes = words.length ? Math.max(1, Math.ceil(words.length / 200)) : 0;
      const speakingMinutes = words.length ? Math.max(1, Math.ceil(words.length / 130)) : 0;

      output.words.textContent = words.length.toLocaleString();
      output.chars.textContent = value.length.toLocaleString();
      output.charsNoSpaces.textContent = value.replace(/\s/g, '').length.toLocaleString();
      output.sentences.textContent = sentences.length.toLocaleString();
      output.paragraphs.textContent = paragraphs.length.toLocaleString();
      output.readingTime.textContent = pluralMinutes(readingMinutes);
      output.speakingTime.textContent = pluralMinutes(speakingMinutes);
    }

    text.addEventListener('input', countText);
    document.getElementById('clear').addEventListener('click', () => {
      text.value = '';
      text.focus();
      countText();
    });

    countText();
  </script>
</body>
</html>
