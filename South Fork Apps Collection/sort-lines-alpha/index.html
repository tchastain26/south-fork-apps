<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sort Lines Alpha | South Fork Apps</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#111412;--surface:#1a1f1b;--surface-2:#202722;--border:#2a2f2b;--accent:#7ddb84;--text:#e8e8e8;--muted:#aab5ac;}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}.nav{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;background:#1a1f1b;border-bottom:1px solid #2a2f2b;font-family:'Plus Jakarta Sans',sans-serif}.nav-back{color:#7ddb84;text-decoration:none;font-size:.875rem;font-weight:500}.nav-back:hover{text-decoration:underline}.nav-title{color:#e8e8e8;font-size:.875rem;font-weight:600}main{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:2rem 0}.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem}h1{margin:0 0 .5rem;font-size:clamp(2rem,7vw,4rem);line-height:1}p{margin:0;color:var(--muted);line-height:1.6}.row{display:grid;grid-template-columns:1fr 220px;gap:.75rem;margin-top:1rem}.layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}textarea,select{width:100%;border:1px solid var(--border);border-radius:8px;background:#111412;color:var(--text);font:inherit;padding:1rem}textarea{min-height:22rem;resize:vertical}.actions{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}button{min-height:2.8rem;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font:inherit;font-weight:800;padding:0 1rem;cursor:pointer}.primary{border-color:var(--accent);background:var(--accent);color:#102113}.meta{margin-top:.75rem;color:var(--muted);font-size:.9rem;font-weight:700}footer{margin-top:1rem;text-align:center;color:var(--muted);font-size:.8rem}@media(max-width:860px){.layout,.row{grid-template-columns:1fr}.nav{padding-inline:1rem}}</style></head>
<body><nav class="nav"><a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a><span class="nav-title">Sort Lines Alpha</span></nav><main><section class="panel"><h1>Sort lines fast.</h1><p>Alphabetize lists in ascending or descending order.</p><div class="row"><textarea id="input" placeholder="banana&#10;apple&#10;carrot"></textarea><select id="order"><option value="asc">A to Z</option><option value="desc">Z to A</option></select></div><div class="layout"><textarea id="output" readonly placeholder="Sorted output"></textarea><div><div class="actions"><button id="copy" class="primary" type="button">Copy Result</button><button id="clear" type="button">Clear</button></div><div id="meta" class="meta">Ready.</div></div></div><footer>v1.0</footer></section></main><script>const i=document.getElementById('input'),o=document.getElementById('output'),s=document.getElementById('order'),m=document.getElementById('meta');function u(){const l=i.value.split('\n');const r=[...l].sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));o.value=(s.value==='desc'?r.reverse():r).join('\n');m.textContent=`${l.filter(Boolean).length} lines sorted.`}i.addEventListener('input',u);s.addEventListener('change',u);document.getElementById('clear').addEventListener('click',()=>{i.value='';u()});document.getElementById('copy').addEventListener('click',async()=>{await navigator.clipboard.writeText(o.value);m.textContent='Copied result.'});u();</script></body></html>
