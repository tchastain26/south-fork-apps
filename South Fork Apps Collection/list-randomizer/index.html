<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>List Randomizer | South Fork Apps</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#111412;--surface:#1a1f1b;--surface-2:#202722;--border:#2a2f2b;--accent:#7ddb84;--text:#e8e8e8;--muted:#aab5ac}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}.nav{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;background:#1a1f1b;border-bottom:1px solid #2a2f2b;font-family:'Plus Jakarta Sans',sans-serif}.nav-back{color:#7ddb84;text-decoration:none;font-size:.875rem;font-weight:500}.nav-back:hover{text-decoration:underline}.nav-title{color:#e8e8e8;font-size:.875rem;font-weight:600}main{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:2rem 0}.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem}h1{margin:0 0 .5rem;font-size:clamp(2rem,7vw,4rem);line-height:1}p{margin:0;color:var(--muted);line-height:1.6}.layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}textarea{width:100%;min-height:22rem;border:1px solid var(--border);border-radius:8px;background:#111412;color:var(--text);font:inherit;padding:1rem;resize:vertical}.actions{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}button{min-height:2.8rem;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font:inherit;font-weight:800;padding:0 1rem;cursor:pointer}.primary{border-color:var(--accent);background:var(--accent);color:#102113}.meta{margin-top:.75rem;color:var(--muted);font-size:.9rem;font-weight:700}footer{margin-top:1rem;text-align:center;color:var(--muted);font-size:.8rem}@media(max-width:860px){.layout{grid-template-columns:1fr}.nav{padding-inline:1rem}}</style></head>
<body><nav class="nav"><a href="https://southforkapps.com" class="nav-back">← South Fork Apps</a><span class="nav-title">List Randomizer</span></nav><main><section class="panel"><h1>Shuffle any list.</h1><p>Randomize lines for picks, turn order, or quick variety.</p><div class="layout"><textarea id="input" placeholder="Alice&#10;Bob&#10;Charlie"></textarea><textarea id="output" readonly placeholder="Randomized output"></textarea></div><div class="actions"><button id="shuffle" class="primary" type="button">Shuffle</button><button id="copy" type="button">Copy Result</button><button id="clear" type="button">Clear</button></div><div id="meta" class="meta">Ready.</div><footer>v1.0</footer></section></main><script>const i=document.getElementById('input'),o=document.getElementById('output'),m=document.getElementById('meta');function shuffle(){const lines=i.value.split('\n');for(let x=lines.length-1;x>0;x-=1){const y=Math.floor(Math.random()*(x+1));[lines[x],lines[y]]=[lines[y],lines[x]]}o.value=lines.join('\n');m.textContent=`${lines.filter(Boolean).length} lines shuffled.`}document.getElementById('shuffle').addEventListener('click',shuffle);document.getElementById('clear').addEventListener('click',()=>{i.value='';o.value='';m.textContent='Cleared.'});document.getElementById('copy').addEventListener('click',async()=>{await navigator.clipboard.writeText(o.value);m.textContent='Copied result.'});shuffle();</script></body></html>
