<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Timer | South Fork Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111412;
      --surface: #191c1a;
      --text: #e1e3df;
      --text-muted: #becaba;
      --accent: #7ddb84;
      --accent-dark: #003910;
      --border: rgba(63, 73, 62, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
    }
    nav {
      background: #0c0f0d;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }
    nav a {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    nav a:hover { opacity: 0.75; }
    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 49px);
      padding: 2rem 1rem;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .button-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    button {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      background: transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .start-btn { border-color: var(--accent); color: var(--accent); }
    .start-btn:hover { background: var(--accent); color: var(--accent-dark); }
    .stop-btn { border-color: #ff6b6b; color: #ff6b6b; }
    .stop-btn:hover { background: #ff6b6b; color: #1a0000; }
    .reset-btn { border-color: var(--text-muted); color: var(--text-muted); }
    .reset-btn:hover { background: var(--text-muted); color: var(--bg); }
    .clock-container { text-align: center; margin-bottom: 1.5rem; }
    .clock-text {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }
    h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .history-container { display: flex; flex-direction: column; gap: 0.5rem; }
    .session-item {
      padding: 0.75rem 1rem;
      background: #0c0f0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <nav><a href="https://southforkapps.com">← South Fork Apps</a></nav>
  <div class="page">
    <div id="app">
      <h1>Task Timer</h1>
      <div class="button-group">
        <button type="button" onclick="startClock()" class="start-btn">Start</button>
        <button type="button" onclick="stopClock()" class="stop-btn">Stop</button>
        <button type="button" onclick="resetClock()" class="reset-btn">Reset</button>
      </div>
      <div class="clock-container">
        <span id="clockText" class="clock-text">00:00:00</span>
      </div>
      <h2>Session History</h2>
      <div id="historyContainer" class="history-container"></div>
    </div>
  </div>

  <script>
    let startTime;
    let elapsedTime = 0;
    let intervalId;
    const sessionHistory = document.getElementById('historyContainer');

    function startClock() {
      if (intervalId) return;
      startTime = Date.now();
      intervalId = setInterval(updateTime, 1000);
    }

    function stopClock() {
      clearInterval(intervalId);
      intervalId = null;
    }

    function resetClock() {
      stopClock();
      elapsedTime = 0;
      document.getElementById('clockText').textContent = '00:00:00';
    }

    function updateTime() {
      const currentTime = Date.now();
      elapsedTime += (currentTime - (startTime + elapsedTime));

      let hours = Math.floor(elapsedTime / 3600000);
      let minutes = Math.floor((elapsedTime % 3600000) / 60000);
      let seconds = Math.floor((elapsedTime % 60000) / 1000);

      hours = pad(hours, 2);
      minutes = pad(minutes, 2);
      seconds = pad(seconds, 2);

      const timeString = `${hours}:${minutes}:${seconds}`;
      document.getElementById('clockText').textContent = timeString;

      if (!intervalId && elapsedTime > 0) {
        addSessionToHistory(timeString);
        resetClock();
      }
    }

    function pad(num, size) {
      return String(num).padStart(size, '0');
    }

    function addSessionToHistory(time) {
      const sessionItem = document.createElement('div');
      sessionItem.classList.add('session-item');
      sessionItem.textContent = `Session Duration: ${time}`;
      sessionHistory.appendChild(sessionItem);
    }
  </script>
</body>
</html>
