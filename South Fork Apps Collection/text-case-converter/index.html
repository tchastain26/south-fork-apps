<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter | South Fork Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111412;
    --surface: #191c1a;
    --text: #e1e3df;
    --text-muted: #becaba;
    --accent: #7ddb84;
    --accent-dark: #003910;
    --border: rgba(63, 73, 62, 0.3);
    --drag-color: rgba(63, 73, 62, 0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
  }
  nav {
    background: #0c0f0d;
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  nav a {
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  nav a:hover { opacity: 0.75; }
  .page {
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app-container {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    font-size: 0.875rem;
    color: var(--text-muted);
  }
  .input-section textarea {
    width: 100%;
    min-height: 100px;
    padding: 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-section textarea:focus { border-color: var(--accent); }
  .input-section textarea::placeholder { color: var(--text-muted); opacity: 0.5; }
  .output-section {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .case-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.2s, background 0.2s;
  }
  .case-card:hover { border-color: rgba(125, 219, 132, 0.2); }
  .case-card.dragging { opacity: 0.4; border-color: var(--accent); }
  .drag-handle {
    cursor: grab;
    color: var(--drag-color);
    font-size: 1rem;
    padding-right: 0.25rem;
    display: flex;
    align-items: center;
    user-select: none;
    letter-spacing: -2px;
  }
  .drag-handle:active { cursor: grabbing; }
  .case-content {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    overflow: hidden;
  }
  .case-details {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    overflow: hidden;
    flex: 1;
  }
  .case-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 700;
  }
  .case-value {
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 1.2rem;
    color: var(--text);
    font-family: 'Courier New', monospace;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.35rem 0.85rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn:active { transform: scale(0.96); }
  .copy-btn.success { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<nav><a href="https://southforkapps.com">← South Fork Apps</a></nav>
<div class="page">
  <div class="app-container">
    <div>
      <h1>Text Case Converter</h1>
      <p class="subtitle">Type or paste text, copy any case. Drag rows to reorder.</p>
    </div>
    <div class="input-section">
      <textarea id="textInput" placeholder="Enter text to convert..."></textarea>
    </div>
    <div class="output-section" id="outputContainer"></div>
  </div>
</div>

<script>
  const textInput = document.getElementById('textInput');
  const outputContainer = document.getElementById('outputContainer');

  const getWords = (str) => str.match(/[a-zA-Z0-9]+/g) || [];

  const cases = [
    { name: 'Lowercase', transform: s => s.toLowerCase() },
    { name: 'UPPERCASE', transform: s => s.toUpperCase() },
    { name: 'Sentence case', transform: s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() },
    { name: 'Title Case', transform: s => s.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') },
    { name: 'camelCase', transform: s => getWords(s).map((w, i) => i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('') },
    { name: 'PascalCase', transform: s => getWords(s).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('') },
    { name: 'snake_case', transform: s => getWords(s).map(w => w.toLowerCase()).join('_') },
    { name: 'kebab-case', transform: s => getWords(s).map(w => w.toLowerCase()).join('-') },
    { name: 'CONSTANT_CASE', transform: s => getWords(s).map(w => w.toUpperCase()).join('_') },
    { name: 'COBOL-CASE', transform: s => getWords(s).map(w => w.toUpperCase()).join('-') },
    { name: 'dot.case', transform: s => getWords(s).map(w => w.toLowerCase()).join('.') },
    { name: 'path/case', transform: s => getWords(s).map(w => w.toLowerCase()).join('/') },
    { name: 'Space Case', transform: s => getWords(s).map(w => w.toLowerCase()).join(' ') },
    { name: 'Title_Snake_Case', transform: s => getWords(s).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('_') },
    { name: 'Title-Kebab-Case', transform: s => getWords(s).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('-') },
    { name: 'AlTeRnAtInG cAsE', transform: s => s.split('').map((c, i) => i % 2 === 0 ? c.toUpperCase() : c.toLowerCase()).join('') },
    { name: 'aLtErNaTiNg CaSe', transform: s => s.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join('') },
    { name: 'Vowel UPPERCASE', transform: s => s.split('').map(c => /[aeiou]/i.test(c) ? c.toUpperCase() : c.toLowerCase()).join('') },
    { name: 'Consonant UPPERCASE', transform: s => s.split('').map(c => /[^aeiou\s\W\d]/i.test(c) ? c.toUpperCase() : c.toLowerCase()).join('') },
    { name: 'Reversed String', transform: s => s.split('').reverse().join('') }
  ];

  function initializeCards() {
    const fragment = document.createDocumentFragment();

    cases.forEach(({ name }) => {
      const card = document.createElement('div');
      card.className = 'case-card';
      card.draggable = true;
      card.dataset.name = name;

      const dragHandle = document.createElement('div');
      dragHandle.className = 'drag-handle';
      dragHandle.innerHTML = '⋮⋮';

      const content = document.createElement('div');
      content.className = 'case-content';

      const details = document.createElement('div');
      details.className = 'case-details';

      const label = document.createElement('span');
      label.className = 'case-label';
      label.textContent = name;

      const value = document.createElement('span');
      value.className = 'case-value';

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(value.textContent);
          btn.textContent = 'Copied!';
          btn.classList.add('success');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('success');
          }, 1500);
        } catch (err) {
          btn.textContent = 'Error';
        }
      };

      details.appendChild(label);
      details.appendChild(value);
      content.appendChild(details);
      content.appendChild(btn);
      card.appendChild(dragHandle);
      card.appendChild(content);

      card.addEventListener('dragstart', () => { card.classList.add('dragging'); });
      card.addEventListener('dragend', () => { card.classList.remove('dragging'); });

      fragment.appendChild(card);
    });

    outputContainer.appendChild(fragment);
  }

  outputContainer.addEventListener('dragover', e => {
    e.preventDefault();
    const afterElement = getDragAfterElement(outputContainer, e.clientY);
    const draggable = document.querySelector('.dragging');
    if (afterElement == null) {
      outputContainer.appendChild(draggable);
    } else {
      outputContainer.insertBefore(draggable, afterElement);
    }
  });

  function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.case-card:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function updateOutputs() {
    const text = textInput.value;
    document.querySelectorAll('.case-card').forEach(card => {
      const caseName = card.dataset.name;
      const caseObj = cases.find(c => c.name === caseName);
      const valueEl = card.querySelector('.case-value');
      if (!text.trim()) {
        valueEl.textContent = '';
      } else {
        valueEl.textContent = caseObj.transform(text);
      }
    });
  }

  textInput.addEventListener('input', updateOutputs);
  initializeCards();
</script>
</body>
</html>
